hero:
  badge: Hi, I'm Marius
  title: I build custom tools for small businesses.
  description: >-
    Tools, web apps, and AI things for small businesses that need something
    specific. 10 years in engineering and 3 in agency work means I understand
    both how things get built and how they sell. Got a project in mind, or just
    a rough idea of what you want? That's where I come in.
  cta: Let's talk
  ctaHref: /contact
beliefs:
  title: What I believe
  description: My actual opinions, in my words. This is what working with me is like.
howIWork:
  title: How I work
  description: >-
    I'm a one-person shop, so I take on a limited number of projects. I'd rather
    build a handful of things properly than juggle 10 and do them all halfway. I
    keep 2 active prokects at the time. When those are gone, you go on a short
    waitlist, and I'll tell you when a slot opens up.
mainServices:
  badge: Services
  title: My main services
  description: ""
  buttonText: Book a call
  buttonHref: /contact
faq:
  badge: FAQ
  title: Frequently Asked Questions
blog:
  title: Latest from the blog
  description: >-
    I build things and write down how. Real walkthroughs, setup guides, and the
    odd strong opinion. No fluff, nothing written by a robot.
  cta: Read the blog
  href: /blog
tools:
  title: My favourite tools
  description: >-
    Honestly, building and trying tools is what I do for fun. I build little
    custom tools for myself, I lean on AI heavily in my own work, and I'm always
    testing the newest things. So I keep a short, honest list of the software I
    actually use, and what I really think of each. No 50-item lists, nothing I
    haven't touched.
  cta: See my favourite tools
  href: /tools
bottomCta:
  title: Too many AI tools and no idea which one you actually need?
  description: >-
    That's as good a reason to talk as any. Maybe you've got a clear project in
    mind, maybe you're just stuck between 10 tools that all promise the same
    thing. Either way, we'll figure out what you actually need, and what's
    genuinely best for you, even if that turns out not to be me.
  cta: Let's talk
  href: /contact
